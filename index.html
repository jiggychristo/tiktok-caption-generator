<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Caption Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #0f0f0f; color: #fff; padding: 20px; max-width: 500px; margin: auto; }
    h1 { text-align: center; font-size: 1.3rem; margin-bottom: 20px; color: #fe2c55; }
    .card { background: #1a1a1a; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    label { font-size: 0.85rem; color: #aaa; display: block; margin-bottom: 6px; }
    input[type="file"] { width: 100%; padding: 10px; background: #2a2a2a; border: 1px dashed #444; border-radius: 8px; color: #fff; cursor: pointer; }
    .api-key-input { width: 100%; padding: 10px; background: #2a2a2a; border: 1px solid #444; border-radius: 8px; color: #fff; font-size: 0.9rem; }
    button { width: 100%; padding: 14px; background: #fe2c55; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 8px; }
    button:disabled { background: #555; cursor: not-allowed; }
    .product-list { display: flex; flex-direction: column; gap: 8px; }
    .product-row { display: flex; gap: 8px; }
    .product-row input { flex: 1; padding: 8px; background: #2a2a2a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 0.9rem; }
    .caption-card { background: #1a1a1a; border-radius: 12px; padding: 16px; text-align: center; }
    .caption-text { font-size: 1.1rem; line-height: 1.5; margin-bottom: 16px; }
    .nav-buttons { display: flex; gap: 8px; }
    .nav-buttons button { background: #2a2a2a; }
    .copy-btn { background: #fe2c55 !important; }
    .counter { text-align: center; color: #aaa; font-size: 0.85rem; margin-bottom: 10px; }
    .status { text-align: center; color: #aaa; font-size: 0.85rem; margin-top: 8px; min-height: 20px; }
  </style>
</head>
<body>
  <h1>🎵 Caption Generator</h1>

  <!-- Step 1: API Key -->
  <div class="card">
    <label>Anthropic API Key</label>
    <input class="api-key-input" type="password" id="apiKey" placeholder="sk-ant-..." />
  </div>

  <!-- Step 2: Upload Screenshot -->
  <div class="card">
    <label>Upload product list screenshot</label>
    <input type="file" id="imageUpload" accept="image/*" />
    <button id="extractBtn" disabled onclick="extractProducts()">Extract Products</button>
    <div class="status" id="extractStatus"></div>
  </div>

  <!-- Step 3: Review Products -->
  <div class="card" id="productSection" style="display:none">
    <label>Review & edit products (add brand if needed)</label>
    <div class="product-list" id="productList"></div>
    <button onclick="generateCaptions()" style="margin-top:12px">Generate Captions</button>
  </div>

  <!-- Step 4: Captions -->
  <div class="card" id="captionSection" style="display:none">
    <div class="counter" id="counter"></div>
    <div class="caption-card">
      <div class="caption-text" id="captionText"></div>
      <button class="copy-btn" onclick="copyCaption()">Copy</button>
      <div class="nav-buttons" style="margin-top:8px">
        <button onclick="prevCaption()">← Prev</button>
        <button onclick="nextCaption()">Next →</button>
      </div>
    </div>
  </div>

  <script>
    const templates = [
      "when the [brand/company] is [closing/rebranding/cancelled] so the [product] is [dirt cheap/on ultra discount] [today/rn]",
      "woke up to the [product] costing less than [comparison] today",
      "woke up to the [brand] cancelled and the [product] actually dirt cheap",
      "woke up shocked at how cheap the [product] is [today/rn]",
      "did anyone else get a coupon for [product]? bc i am shocked at how cheap it is [today/rn]"
    ];

    const variations = {
      "[closing/rebranding/cancelled]": ["closing", "rebranding", "cancelled", "shutting down"],
      "[dirt cheap/on ultra discount]": ["dirt cheap", "on ultra discount"],
      "[today/rn]": ["today", "rn", "right now"],
      "[comparison]": ["one bottle", "a single item", "ever before"],
      "[brand/company]": ["brand", "company"],
    };

    let captions = [];
    let currentIndex = 0;

    document.getElementById("apiKey").addEventListener("input", () => {
      document.getElementById("extractBtn").disabled = !document.getElementById("apiKey").value.trim();
    });

    document.getElementById("imageUpload").addEventListener("change", () => {
      document.getElementById("extractBtn").disabled = !document.getElementById("apiKey").value.trim();
    });

    async function extractProducts() {
      const apiKey = document.getElementById("apiKey").value.trim();
      const file = document.getElementById("imageUpload").files[0];
      if (!file) return alert("Please upload a screenshot first.");

      const status = document.getElementById("extractStatus");
      status.textContent = "Reading screenshot...";
      document.getElementById("extractBtn").disabled = true;

      const base64 = await toBase64(file);
      const mediaType = file.type;

      try {
        const response = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": apiKey,
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true"
          },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1000,
            messages: [{
              role: "user",
              content: [
                { type: "image", source: { type: "base64", media_type: mediaType, data: base64 } },
                { type: "text", text: "Extract the product names from this screenshot. Return ONLY a JSON array of strings, no explanation, no markdown. Example: [\"Lip Stain\", \"Full Kit\", \"Pink Mask\"]" }
              ]
            }]
          })
        });

        const data = await response.json();
        console.log("API response:", JSON.stringify(data));
        if (!data.content) throw new Error(JSON.stringify(data));
        const text = data.content[0].text.replace(/```json|```/g, "").trim();
        const products = JSON.parse(text);
        renderProductList(products);
        status.textContent = `Found ${products.length} products. Review below.`;
      } catch (err) {
        status.textContent = "Error: " + err.message;
        console.error(err);
        document.getElementById("extractBtn").disabled = false;
      }
    }

    function renderProductList(products) {
      const list = document.getElementById("productList");
      list.innerHTML = "";
      products.forEach((p, i) => {
        const row = document.createElement("div");
        row.className = "product-row";
        row.innerHTML = `
          <input placeholder="Product" value="${p}" id="product_${i}" />
          <input placeholder="Brand (optional)" id="brand_${i}" />
        `;
        list.appendChild(row);
      });
      document.getElementById("productSection").style.display = "block";
    }

    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function fillTemplate(template, product, brand) {
      let result = template;
      for (const [key, vals] of Object.entries(variations)) {
        result = result.replaceAll(key, pick(vals));
      }
      result = result.replaceAll("[product]", product);
      result = result.replaceAll("[brand]", brand || "the brand");
      result = result.replaceAll("[brand/company]", brand || pick(["the brand", "the company"]));
      return result;
    }

    function generateCaptions() {
      captions = [];
      let i = 0;
      while (document.getElementById(`product_${i}`) !== null) {
        const product = document.getElementById(`product_${i}`).value.trim();
        const brand = document.getElementById(`brand_${i}`).value.trim();
        const template = pick(templates);
        captions.push(fillTemplate(template, product, brand));
        i++;
      }
      currentIndex = 0;
      showCaption();
      document.getElementById("captionSection").style.display = "block";
    }

    function showCaption() {
      document.getElementById("captionText").textContent = captions[currentIndex];
      document.getElementById("counter").textContent = `${currentIndex + 1} of ${captions.length}`;
    }

    function copyCaption() {
      navigator.clipboard.writeText(captions[currentIndex]);
      const btn = document.querySelector(".copy-btn");
      btn.textContent = "Copied!";
      setTimeout(() => btn.textContent = "Copy", 1500);
    }

    function nextCaption() { if (currentIndex < captions.length - 1) { currentIndex++; showCaption(); } }
    function prevCaption() { if (currentIndex > 0) { currentIndex--; showCaption(); } }

    function toBase64(file) {
      return new Promise((res, rej) => {
        const reader = new FileReader();
        reader.onload = () => res(reader.result.split(",")[1]);
        reader.onerror = rej;
        reader.readAsDataURL(file);
      });
    }
  </script>
</body>
</html>

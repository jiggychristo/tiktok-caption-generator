<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Caption Generator</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Captions" />
  <meta name="theme-color" content="#fe2c55" />
  <style>
    :root {
      --bg: #0f0f0f; --card: #1a1a1a; --input: #2a2a2a;
      --text: #ffffff; --subtext: #aaaaaa; --border: #444444;
      --accent: #fe2c55; --green: #2a7a4f; --danger: #555555;
    }
    .light {
      --bg: #f0f0f0; --card: #ffffff; --input: #e8e8e8;
      --text: #111111; --subtext: #666666; --border: #cccccc;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 20px; max-width: 500px; margin: auto; transition: background 0.2s, color 0.2s; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .topbar h1 { font-size: 1.3rem; color: var(--accent); margin: 0; }
    .theme-btn { background: none; border: none; font-size: 1.4rem; cursor: pointer; width: auto; margin: 0; padding: 4px; }
    .card { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    label { font-size: 0.85rem; color: var(--subtext); display: block; margin-bottom: 6px; }
    input[type="file"] { width: 100%; padding: 10px; background: var(--input); border: 1px dashed var(--border); border-radius: 8px; color: var(--text); cursor: pointer; }
    .text-input { width: 100%; padding: 10px; background: var(--input); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.9rem; }
    button { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 8px; }
    button:disabled { background: var(--danger); cursor: not-allowed; }
    .product-list { display: flex; flex-direction: column; gap: 8px; }
    .product-row { display: flex; gap: 8px; align-items: flex-start; }
    .product-row-inputs { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .product-row-inputs input { width: 100%; padding: 8px; background: var(--input); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.9rem; }
    .check-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; margin-top: 8px; }
    .check-label { font-size: 0.75rem; color: var(--subtext); }
    .save-check { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }
    .caption-card { text-align: center; padding: 8px 0; }
    .caption-text { font-size: 1.1rem; line-height: 1.8; margin-bottom: 16px; white-space: pre-line; }
    .nav-buttons { display: flex; gap: 8px; margin-top: 8px; }
    .nav-buttons button { background: var(--input); }
    .copy-btn { background: var(--accent) !important; }
    .reroll-btn { background: var(--green) !important; margin-top: 6px; }
    .counter { text-align: center; color: var(--subtext); font-size: 0.85rem; margin-bottom: 10px; }
    .swipe-hint { text-align: center; color: var(--subtext); font-size: 0.75rem; margin-top: 8px; }
    .status { text-align: center; color: var(--subtext); font-size: 0.85rem; margin-top: 8px; min-height: 20px; word-break: break-word; }
    .error { color: #ff6b6b; }
    .success { color: #4caf50; }
    .saved-item { background: var(--input); border-radius: 8px; padding: 10px; margin-bottom: 8px; }
    .saved-item-header { display: flex; justify-content: space-between; align-items: center; }
    .saved-item-name { font-size: 0.9rem; font-weight: bold; }
    .saved-item-meta { font-size: 0.75rem; color: var(--subtext); margin-top: 2px; }
    .delete-btn { width: auto; padding: 6px 12px; font-size: 0.8rem; margin: 0; background: var(--danger); }
    .section-title { font-size: 0.95rem; font-weight: bold; margin-bottom: 10px; color: var(--accent); }
    .green-btn { background: var(--green) !important; }
    .template-item { background: var(--input); border-radius: 8px; padding: 10px; margin-bottom: 8px; font-size: 0.85rem; line-height: 1.5; display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .template-item span { flex: 1; color: var(--text); }
    .template-actions button { width: auto; padding: 4px 10px; font-size: 0.75rem; margin: 0; background: var(--danger); }
    textarea { width: 100%; padding: 10px; background: var(--input); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.85rem; min-height: 80px; resize: vertical; }
    .tab-bar { display: flex; gap: 6px; margin-bottom: 16px; }
    .tab { flex: 1; padding: 10px 4px; background: var(--input); border: none; border-radius: 8px; color: var(--subtext); font-size: 0.78rem; cursor: pointer; white-space: nowrap; }
    .tab.active { background: var(--accent); color: #fff; }
    .key-row { display: flex; gap: 8px; align-items: flex-end; }
    .key-row .text-input { flex: 1; }
    .key-save-btn { width: auto; padding: 10px 14px; margin: 0; font-size: 0.85rem; flex-shrink: 0; }
    .analyzed-label { font-size: 0.75rem; color: var(--subtext); margin-bottom: 4px; margin-top: 10px; }
    .analyzed-preview { background: var(--input); border-radius: 8px; padding: 12px; font-size: 0.9rem; line-height: 1.6; color: var(--text); }
  </style>
</head>
<body>

  <div class="topbar">
    <h1>🎵 Caption Generator</h1>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">☀️</button>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('generate')">Generate</button>
    <button class="tab" onclick="switchTab('saved')">Saved</button>
    <button class="tab" onclick="switchTab('templates')">Templates</button>
    <button class="tab" onclick="switchTab('analyze')">Analyze</button>
  </div>

  <!-- GENERATE -->
  <div id="tab-generate">
    <div class="card">
      <label>Anthropic API Key</label>
      <div class="key-row">
        <input class="text-input" type="password" id="apiKey" placeholder="sk-ant-..." />
        <button class="key-save-btn" onclick="saveApiKey()">Save</button>
      </div>
      <div class="status" id="keyStatus"></div>
    </div>

    <div class="card">
      <label>Upload product list screenshot</label>
      <input type="file" id="imageUpload" accept="image/*" />
      <button id="extractBtn" disabled onclick="extractProducts()">Extract Products</button>
      <div class="status" id="extractStatus"></div>
    </div>

    <div class="card" id="productSection" style="display:none">
      <label>Review & edit — check to save product</label>
      <div class="product-list" id="productList"></div>
      <button onclick="generateCaptions()" style="margin-top:12px">Generate Captions</button>
    </div>

    <div class="card" id="captionSection" style="display:none">
      <div class="counter" id="counter"></div>
      <div class="caption-card">
        <div class="caption-text" id="captionText"></div>
        <button class="copy-btn" onclick="copyCaption()">Copy</button>
        <button class="reroll-btn" onclick="rerollCaption()">↻ Re-roll</button>
        <div class="nav-buttons">
          <button onclick="prevCaption()">← Prev</button>
          <button onclick="nextCaption()">Next →</button>
        </div>
      </div>
      <div class="swipe-hint">swipe left / right to navigate</div>
    </div>
  </div>

  <!-- SAVED -->
  <div id="tab-saved" style="display:none">
    <div class="card">
      <div class="section-title">Saved Products</div>
      <div id="savedList"><div class="status">Loading...</div></div>
      <button class="green-btn" onclick="generateFromSaved()" style="margin-top:8px">Generate Batch from Saved</button>
    </div>
    <div class="card" id="savedCaptionSection" style="display:none">
      <div class="counter" id="savedCounter"></div>
      <div class="caption-card">
        <div class="caption-text" id="savedCaptionText"></div>
        <button class="copy-btn" onclick="copySavedCaption()">Copy</button>
        <button class="reroll-btn" onclick="rerollSavedCaption()">↻ Re-roll</button>
        <div class="nav-buttons">
          <button onclick="prevSavedCaption()">← Prev</button>
          <button onclick="nextSavedCaption()">Next →</button>
        </div>
      </div>
      <div class="swipe-hint">swipe left / right to navigate</div>
    </div>
  </div>

  <!-- TEMPLATES -->
  <div id="tab-templates" style="display:none">
    <div class="card">
      <div class="section-title">Your Templates</div>
      <div id="templateList"><div class="status">Loading...</div></div>
    </div>
    <div class="card">
      <div class="section-title">Add New Template</div>
      <label>Use [product], [brand], [brand/company] as placeholders</label>
      <textarea id="newTemplate" placeholder="e.g. woke up shocked at how cheap the [product] is [today/rn]"></textarea>
      <button onclick="addTemplate()">Add Template</button>
      <div class="status" id="templateStatus"></div>
    </div>
  </div>

  <!-- ANALYZE -->
  <div id="tab-analyze" style="display:none">
    <div class="card">
      <div class="section-title">Analyze a Video</div>
      <label>Upload a screenshot of a well-performing video — Claude will extract the caption and turn it into a reusable template</label>
      <input type="file" id="analyzeUpload" accept="image/*" />
      <button id="analyzeBtn" onclick="analyzeVideo()">Analyze Caption</button>
      <div class="status" id="analyzeStatus"></div>
    </div>
    <div class="card" id="analyzeResult" style="display:none">
      <div class="section-title">Result</div>
      <div class="analyzed-label">Original caption:</div>
      <div class="analyzed-preview" id="originalCaption"></div>
      <div class="analyzed-label">Template version:</div>
      <div class="analyzed-preview" id="templateCaption"></div>
      <button class="green-btn" onclick="saveAnalyzedTemplate()" style="margin-top:12px">Save as Template</button>
      <div class="status" id="analyzeSaveStatus"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyAd75-gKyCI5NGN5NsNIfTUVu02NN-D7_A",
      authDomain: "bof-caption-generator.firebaseapp.com",
      projectId: "bof-caption-generator",
      storageBucket: "bof-caption-generator.firebasestorage.app",
      messagingSenderId: "190217265438",
      appId: "1:190217265438:web:856c0fa7f97556a400690f"
    });
    const db = firebase.firestore();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    const defaultTemplates = [
      "when the [brand/company] is [closing/rebranding/cancelled] so the [product] is [dirt cheap/on ultra discount] [today/rn]",
      "woke up to the [product] costing less than [comparison] today",
      "woke up to the [brand] cancelled and the [product] actually dirt cheap",
      "woke up shocked at how cheap the [product] is [today/rn]",
      "did anyone else get a coupon for [product]? bc i am shocked at how cheap it is [today/rn]"
    ];

    const variations = {
      "[closing/rebranding/cancelled]": ["closing", "rebranding", "cancelled", "shutting down"],
      "[dirt cheap/on ultra discount]": ["dirt cheap", "on ultra discount"],
      "[today/rn]": ["today", "rn", "right now"],
      "[comparison]": ["one bottle", "a single item", "ever before"],
      "[brand/company]": ["brand", "company"]
    };

    let captions = [], captionProducts = [];
    let savedCaptions = [], savedCaptionMeta = [];
    let currentIndex = 0, savedCurrentIndex = 0;
    let activeTemplates = [];
    let currentTheme = "dark";
    let analyzedTemplate = "";

    // THEME
    function toggleTheme() {
      currentTheme = currentTheme === "dark" ? "light" : "dark";
      applyTheme();
      localStorage.setItem("theme", currentTheme);
    }
    function applyTheme() {
      document.body.classList.toggle("light", currentTheme === "light");
      document.getElementById("themeBtn").textContent = currentTheme === "light" ? "🌙" : "☀️";
    }

    // TABS
    const tabNames = ["generate", "saved", "templates", "analyze"];
    function switchTab(tab) {
      tabNames.forEach((t, i) => {
        document.getElementById(`tab-${t}`).style.display = t === tab ? "block" : "none";
        document.querySelectorAll(".tab")[i].classList.toggle("active", t === tab);
      });
      if (tab === "saved") renderSavedList();
      if (tab === "templates") renderTemplateList();
    }

    // API KEY
    async function loadApiKey() {
      try {
        const doc = await db.collection("config").doc("settings").get();
        if (doc.exists && doc.data().anthropicKey) {
          document.getElementById("apiKey").value = doc.data().anthropicKey;
        }
      } catch(e) {}
      updateExtractBtn();
    }

    async function saveApiKey() {
      const key = document.getElementById("apiKey").value.trim();
      const status = document.getElementById("keyStatus");
      if (!key) { status.textContent = "Enter a key first."; return; }
      try {
        await db.collection("config").doc("settings").set({ anthropicKey: key }, { merge: true });
        status.className = "status success";
        status.textContent = "Key saved!";
        setTimeout(() => status.textContent = "", 2000);
      } catch(e) {
        status.className = "status error";
        status.textContent = "Failed to save.";
      }
    }

    // TEMPLATES
    async function loadTemplates() {
      const doc = await db.collection("config").doc("templates").get();
      if (doc.exists && doc.data().list?.length > 0) {
        activeTemplates = doc.data().list;
      } else {
        activeTemplates = [...defaultTemplates];
        await db.collection("config").doc("templates").set({ list: activeTemplates });
      }
    }

    async function renderTemplateList() {
      await loadTemplates();
      const list = document.getElementById("templateList");
      list.innerHTML = "";
      activeTemplates.forEach((t, i) => {
        const div = document.createElement("div");
        div.className = "template-item";
        div.innerHTML = `<span>${t}</span><div class="template-actions"><button onclick="deleteTemplate(${i})">✕</button></div>`;
        list.appendChild(div);
      });
    }

    async function addTemplate() {
      const val = document.getElementById("newTemplate").value.trim();
      const status = document.getElementById("templateStatus");
      if (!val) { status.textContent = "Please enter a template."; return; }
      await loadTemplates();
      activeTemplates.push(val);
      await db.collection("config").doc("templates").set({ list: activeTemplates });
      document.getElementById("newTemplate").value = "";
      status.className = "status success";
      status.textContent = "Template added!";
      setTimeout(() => status.textContent = "", 2000);
      renderTemplateList();
    }

    async function deleteTemplate(i) {
      await loadTemplates();
      activeTemplates.splice(i, 1);
      await db.collection("config").doc("templates").set({ list: activeTemplates });
      renderTemplateList();
    }

    // SAVED PRODUCTS
    async function renderSavedList() {
      const list = document.getElementById("savedList");
      list.innerHTML = "<div class='status'>Loading...</div>";
      try {
        const snap = await db.collection("savedProducts").get();
        if (snap.empty) { list.innerHTML = "<div class='status'>No saved products yet.</div>"; return; }
        list.innerHTML = "";
        snap.forEach(doc => {
          const item = doc.data();
          const div = document.createElement("div");
          div.className = "saved-item";
          div.innerHTML = `
            <div class="saved-item-header">
              <span class="saved-item-name">${item.product}${item.brand ? " — " + item.brand : ""}</span>
              <button class="delete-btn" onclick="deleteSaved('${doc.id}')">✕</button>
            </div>
            <div class="saved-item-meta">Used ${item.useCount || 0} time${(item.useCount || 0) === 1 ? "" : "s"}</div>
            <input class="text-input" style="margin-top:8px;font-size:0.8rem;" placeholder="Notes (e.g. only use rebranding angle)" value="${item.notes || ""}" onchange="updateNotes('${doc.id}', this.value)" />
          `;
          list.appendChild(div);
        });
      } catch(e) {
        list.innerHTML = "<div class='status error'>Failed to load.</div>";
      }
    }

    async function updateNotes(id, notes) {
      await db.collection("savedProducts").doc(id).update({ notes });
    }

    async function deleteSaved(id) {
      await db.collection("savedProducts").doc(id).delete();
      renderSavedList();
    }

    async function saveProduct(product, brand) {
      const snap = await db.collection("savedProducts").where("product", "==", product).where("brand", "==", brand).get();
      if (snap.empty) {
        await db.collection("savedProducts").add({ product, brand, lastTemplateIndex: -1, useCount: 0, notes: "" });
      }
    }

    async function generateFromSaved() {
      const snap = await db.collection("savedProducts").get();
      if (snap.empty) return;
      await loadTemplates();
      savedCaptions = [];
      savedCaptionMeta = [];
      const updates = [];
      snap.forEach(doc => {
        const item = doc.data();
        const { caption, templateIndex } = fillTemplate(item.product, item.brand, item.lastTemplateIndex);
        savedCaptions.push(caption);
        savedCaptionMeta.push({ docId: doc.id, product: item.product, brand: item.brand, lastTemplateIndex: templateIndex });
        updates.push(db.collection("savedProducts").doc(doc.id).update({
          lastTemplateIndex: templateIndex,
          useCount: (item.useCount || 0) + 1
        }));
      });
      await Promise.all(updates);
      savedCurrentIndex = 0;
      showSavedCaption();
      document.getElementById("savedCaptionSection").style.display = "block";
    }

    function showSavedCaption() {
      document.getElementById("savedCaptionText").textContent = savedCaptions[savedCurrentIndex];
      document.getElementById("savedCounter").textContent = `${savedCurrentIndex + 1} of ${savedCaptions.length}`;
    }

    function copySavedCaption() {
      navigator.clipboard.writeText(savedCaptions[savedCurrentIndex]);
      const btn = document.querySelector("#savedCaptionSection .copy-btn");
      btn.textContent = "Copied!";
      setTimeout(() => btn.textContent = "Copy", 1500);
    }

    async function rerollSavedCaption() {
      await loadTemplates();
      const meta = savedCaptionMeta[savedCurrentIndex];
      const { caption, templateIndex } = fillTemplate(meta.product, meta.brand, meta.lastTemplateIndex);
      savedCaptions[savedCurrentIndex] = caption;
      savedCaptionMeta[savedCurrentIndex].lastTemplateIndex = templateIndex;
      showSavedCaption();
    }

    function nextSavedCaption() { if (savedCurrentIndex < savedCaptions.length - 1) { savedCurrentIndex++; showSavedCaption(); } }
    function prevSavedCaption() { if (savedCurrentIndex > 0) { savedCurrentIndex--; showSavedCaption(); } }

    // EXTRACT + GENERATE
    document.getElementById("apiKey").addEventListener("input", updateExtractBtn);
    document.getElementById("imageUpload").addEventListener("change", updateExtractBtn);

    function updateExtractBtn() {
      const hasKey = document.getElementById("apiKey").value.trim().length > 0;
      const hasFile = document.getElementById("imageUpload").files.length > 0;
      document.getElementById("extractBtn").disabled = !(hasKey && hasFile);
    }

    function getApiKey() { return document.getElementById("apiKey").value.trim(); }

    async function callClaude(messages, max_tokens = 1000) {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": getApiKey(),
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens, messages })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
      if (!data.content?.[0]) throw new Error("Unexpected response: " + JSON.stringify(data));
      return data.content[0].text;
    }

    async function extractProducts() {
      const file = document.getElementById("imageUpload").files[0];
      const status = document.getElementById("extractStatus");
      status.className = "status";
      status.textContent = "Reading screenshot...";
      document.getElementById("extractBtn").disabled = true;
      try {
        const base64 = await toBase64(file);
        const text = await callClaude([{ role: "user", content: [
          { type: "image", source: { type: "base64", media_type: file.type, data: base64 } },
          { type: "text", text: "Extract the product names from this screenshot. Shorten each name to 2-4 words max, keeping only the essential product identity. Remove brand names, sizes, quantities, and filler words. Return ONLY a JSON array of short clean strings, no explanation, no markdown, no backticks. Example: [\"lip stain\", \"full kit\", \"pink mask\"]" }
        ]}]);
        const products = JSON.parse(text.replace(/```json|```/g, "").trim());
        renderProductList(products);
        status.textContent = `Found ${products.length} products. Review below.`;
      } catch(err) {
        status.className = "status error";
        status.textContent = "Error: " + err.message;
        document.getElementById("extractBtn").disabled = false;
      }
    }

    function renderProductList(products) {
      const list = document.getElementById("productList");
      list.innerHTML = "";
      products.forEach((p, i) => {
        const row = document.createElement("div");
        row.className = "product-row";
        row.innerHTML = `
          <div class="product-row-inputs">
            <input placeholder="Product" value="${p}" id="product_${i}" />
            <input placeholder="Brand (optional)" id="brand_${i}" />
          </div>
          <div class="check-wrap">
            <input type="checkbox" class="save-check" id="save_${i}" />
            <span class="check-label">save</span>
          </div>
        `;
        list.appendChild(row);
      });
      document.getElementById("productSection").style.display = "block";
    }

    function pick(arr, exclude = -1) {
      let idx;
      do { idx = Math.floor(Math.random() * arr.length); } while (arr.length > 1 && idx === exclude);
      return { value: arr[idx], index: idx };
    }

    function formatLines(text) {
      const words = text.split(" ");
      const lines = [];
      let i = 0;
      while (i < words.length) {
        const size = Math.floor(Math.random() * 3) + 3;
        lines.push(words.slice(i, i + size).join(" "));
        i += size;
      }
      return lines.join("\n");
    }

    function fillTemplate(product, brand, lastTemplateIndex = -1) {
      const { value: template, index: templateIndex } = pick(activeTemplates, lastTemplateIndex);
      let result = template;
      for (const [key, vals] of Object.entries(variations)) {
        result = result.replaceAll(key, pick(vals).value);
      }
      result = result.replaceAll("[product]", product);
      result = result.replaceAll("[brand]", brand || "the brand");
      result = result.replaceAll("[brand/company]", brand || pick(["the brand", "the company"]).value);
      result = result.toLowerCase().replace(/[\[\]\(\)]/g, "");
      return { caption: formatLines(result), templateIndex };
    }

    async function generateCaptions() {
      await loadTemplates();
      captions = [];
      captionProducts = [];
      let i = 0;
      const saves = [];
      while (document.getElementById(`product_${i}`) !== null) {
        const product = document.getElementById(`product_${i}`).value.trim();
        const brand = document.getElementById(`brand_${i}`).value.trim();
        if (document.getElementById(`save_${i}`).checked) saves.push(saveProduct(product, brand));
        const { caption } = fillTemplate(product, brand);
        captions.push(caption);
        captionProducts.push({ product, brand });
        i++;
      }
      await Promise.all(saves);
      currentIndex = 0;
      showCaption();
      document.getElementById("captionSection").style.display = "block";
    }

    function showCaption() {
      document.getElementById("captionText").textContent = captions[currentIndex];
      document.getElementById("counter").textContent = `${currentIndex + 1} of ${captions.length}`;
    }

    function copyCaption() {
      navigator.clipboard.writeText(captions[currentIndex]);
      const btn = document.querySelector("#captionSection .copy-btn");
      btn.textContent = "Copied!";
      setTimeout(() => btn.textContent = "Copy", 1500);
    }

    async function rerollCaption() {
      await loadTemplates();
      const { product, brand } = captionProducts[currentIndex];
      const { caption } = fillTemplate(product, brand);
      captions[currentIndex] = caption;
      showCaption();
    }

    function nextCaption() { if (currentIndex < captions.length - 1) { currentIndex++; showCaption(); } }
    function prevCaption() { if (currentIndex > 0) { currentIndex--; showCaption(); } }

    // SWIPE
    let touchStartX = 0;
    let swipeContext = null;

    document.addEventListener("touchstart", e => {
      touchStartX = e.touches[0].clientX;
      const genVisible = document.getElementById("tab-generate").style.display !== "none";
      const savedVisible = document.getElementById("tab-saved").style.display !== "none";
      if (genVisible && document.getElementById("captionSection").style.display !== "none") swipeContext = "generate";
      else if (savedVisible && document.getElementById("savedCaptionSection").style.display !== "none") swipeContext = "saved";
      else swipeContext = null;
    });

    document.addEventListener("touchend", e => {
      if (!swipeContext) return;
      const delta = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(delta) < 50) return;
      if (swipeContext === "generate") delta < 0 ? nextCaption() : prevCaption();
      else delta < 0 ? nextSavedCaption() : prevSavedCaption();
    });

    // ANALYZE
    async function analyzeVideo() {
      const file = document.getElementById("analyzeUpload").files[0];
      const status = document.getElementById("analyzeStatus");
      if (!file) { status.textContent = "Please upload a screenshot first."; return; }
      if (!getApiKey()) { status.className = "status error"; status.textContent = "Enter your API key in the Generate tab first."; return; }
      status.className = "status";
      status.textContent = "Analyzing caption...";
      document.getElementById("analyzeBtn").disabled = true;
      document.getElementById("analyzeResult").style.display = "none";
      try {
        const base64 = await toBase64(file);
        const text = await callClaude([{ role: "user", content: [
          { type: "image", source: { type: "base64", media_type: file.type, data: base64 } },
          { type: "text", text: "This is a screenshot of a TikTok video. Extract the text overlay caption. Then create a reusable template by replacing the product name with [product], brand/company name with [brand/company], time words like 'today' or 'rn' with [today/rn], and price descriptors like 'dirt cheap' or 'ultra discount' with [dirt cheap/on ultra discount]. Return ONLY a JSON object with fields 'original' and 'template'. No markdown, no backticks, no explanation." }
        ]}]);
        const parsed = JSON.parse(text.replace(/```json|```/g, "").trim());
        document.getElementById("originalCaption").textContent = parsed.original;
        document.getElementById("templateCaption").textContent = parsed.template;
        analyzedTemplate = parsed.template;
        document.getElementById("analyzeResult").style.display = "block";
        status.textContent = "";
      } catch(err) {
        status.className = "status error";
        status.textContent = "Error: " + err.message;
      } finally {
        document.getElementById("analyzeBtn").disabled = false;
      }
    }

    async function saveAnalyzedTemplate() {
      if (!analyzedTemplate) return;
      await loadTemplates();
      activeTemplates.push(analyzedTemplate);
      await db.collection("config").doc("templates").set({ list: activeTemplates });
      const status = document.getElementById("analyzeSaveStatus");
      status.className = "status success";
      status.textContent = "Saved to templates!";
      setTimeout(() => status.textContent = "", 2000);
    }

    // UTILS
    function toBase64(file) {
      return new Promise((res, rej) => {
        const reader = new FileReader();
        reader.onload = () => res(reader.result.split(",")[1]);
        reader.onerror = rej;
        reader.readAsDataURL(file);
      });
    }

    // INIT
    (async () => {
      currentTheme = localStorage.getItem("theme") || "dark";
      applyTheme();
      await loadApiKey();
    })();
  </script>
</body>
</html>
